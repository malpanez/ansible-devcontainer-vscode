---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: Install system dependencies
  ansible.builtin.apt:
    name: "{{ devcontainer_base_packages }}"
    state: present
  become: true

- name: Create vscode user
  ansible.builtin.user:
    name: "{{ devcontainer_base_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true
    uid: "{{ devcontainer_base_uid | default(omit, true) }}"
  become: true

- name: Configure sudo without password
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ devcontainer_base_user }}"
    line: "{{ devcontainer_base_user }} ALL=(ALL) NOPASSWD:ALL"
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

- name: Check requested timezone data
  ansible.builtin.stat:
    path: "/usr/share/zoneinfo/{{ devcontainer_base_timezone }}"
  register: devcontainer_base_timezone_file
  become: true

- name: Configure /etc/localtime
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ devcontainer_base_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
  when: devcontainer_base_timezone_file.stat.exists
  become: true

- name: Configure /etc/timezone
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ devcontainer_base_timezone }}\n"
    mode: "0644"
  when: devcontainer_base_timezone_file.stat.exists
  become: true

- name: Warn when requested timezone data is unavailable
  ansible.builtin.debug:
    msg: "Timezone {{ devcontainer_base_timezone }} is unavailable in this image; skipping timezone configuration."
  when: not devcontainer_base_timezone_file.stat.exists
  become: true
