---
name: Promote develop to main

# This workflow automatically creates a PR from develop to main when changes are pushed to develop.
# It uses continue-on-error to handle cases where GitHub Actions doesn't have permission to create PRs.
#
# To enable full automation, go to:
# Settings → Actions → General → Workflow permissions
# Enable: "Allow GitHub Actions to create and approve pull requests"
#
# Without this setting, you can still manually create the PR and this workflow will attempt to enable auto-merge.

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      source_branch:
        description: Source branch to promote
        required: false
        default: develop
      target_branch:
        description: Target branch to receive the promotion PR
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-promotion-pr:
    name: Create promotion PR
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      SOURCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_branch || 'develop' }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
        with:
          fetch-depth: 0

      - name: Validate source and target branches
        run: |
          set -euo pipefail

          if [ -z "${SOURCE_BRANCH}" ] || [ -z "${TARGET_BRANCH}" ]; then
            echo "::error::source_branch and target_branch must be set"
            exit 1
          fi

          if [ "${SOURCE_BRANCH}" = "${TARGET_BRANCH}" ]; then
            echo "::error::source_branch and target_branch must be different"
            exit 1
          fi

          git fetch origin "${SOURCE_BRANCH}" "${TARGET_BRANCH}"

      - name: Check if PR already exists
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_COUNT=$(gh pr list --base "${TARGET_BRANCH}" --head "${SOURCE_BRANCH}" --state open --json number --jq 'length')
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create promotion PR
        id: create-pr
        if: steps.check-pr.outputs.pr_count == '0'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --title "chore: promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}" \
            --body "$(cat <<EOF
          ## Automated Promotion

          This PR promotes the current \`${SOURCE_BRANCH}\` branch to \`${TARGET_BRANCH}\` after all tests have passed.

          ### What's included

          All changes merged to \`${SOURCE_BRANCH}\` since the last promotion, including:
          - Feature additions
          - Bug fixes
          - Dependency updates
          - Documentation improvements

          ### Pre-merge checklist

          - [ ] All CI checks passing
          - [ ] No merge conflicts
          - [ ] Reviewed recent commits in ${SOURCE_BRANCH}

          ### Auto-merge

          This PR will automatically merge once all required checks pass.

          ---

          *This PR was created automatically by the promote-to-main workflow.*
          EOF
          )"

      - name: Wait for PR to be ready
        if: steps.check-pr.outputs.pr_count == '0' && steps.create-pr.outcome == 'success'
        run: sleep 5

      - name: Enable auto-merge on promotion PR
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the PR number (works whether we just created it or it already exists)
          PR_NUMBER=$(gh pr list --base "${TARGET_BRANCH}" --head "${SOURCE_BRANCH}" --state open --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER from ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
            # Enable auto-merge with squash strategy
            gh pr merge "$PR_NUMBER" --auto --squash || echo "Auto-merge might already be enabled or permissions insufficient"
          else
            echo "No open PR found from ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
            exit 0
          fi
