---
name: Cleanup GHCR Images

on:
  schedule:
    - cron: '0 2 * * 0'  # Sundays at 2 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not delete)'
        required: false
        default: 'false'
        type: boolean

jobs:
  cleanup-untagged:
    name: Delete Untagged Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        image:
          - devcontainer-base
          - devcontainer-ansible
          - devcontainer-terraform
          - devcontainer-golang
          - devcontainer-latex
    steps:
      - name: Delete untagged container versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55  # v5.1.0
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: true

  verify-protected-tags:
    name: Verify Protected Tags
    runs-on: ubuntu-latest
    needs: cleanup-untagged
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - image: devcontainer-base
            tag: py312
          - image: devcontainer-ansible
            tag: latest
          - image: devcontainer-terraform
            tag: latest
          - image: devcontainer-golang
            tag: latest
          - image: devcontainer-latex
            tag: latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify manifest exists
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.tag }}

  report-tagged-cleanup-policy:
    name: Tagged Cleanup Policy
    runs-on: ubuntu-latest
    needs: cleanup-untagged
    permissions:
      contents: read
    steps:
      - name: Explain policy
        run: |
          echo "Skipping automatic deletion of SHA and branch-tagged versions." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reason: deleting tagged versions can break surviving protected tags if a registry manifest list still references removed content." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Current policy: delete only untagged versions automatically; review tagged cleanup manually." >> $GITHUB_STEP_SUMMARY

  report:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-untagged, verify-protected-tags, report-tagged-cleanup-policy]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Report results
        run: |
          echo "## GHCR Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cleanup completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images processed:" >> $GITHUB_STEP_SUMMARY
          echo "- devcontainer-base" >> $GITHUB_STEP_SUMMARY
          echo "- devcontainer-ansible" >> $GITHUB_STEP_SUMMARY
          echo "- devcontainer-terraform" >> $GITHUB_STEP_SUMMARY
          echo "- devcontainer-golang" >> $GITHUB_STEP_SUMMARY
          echo "- devcontainer-latex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Retention policy:" >> $GITHUB_STEP_SUMMARY
          echo "- Untagged: Keep last 3" >> $GITHUB_STEP_SUMMARY
          echo "- Tagged versions: no automatic deletion" >> $GITHUB_STEP_SUMMARY
          echo "- Verified after cleanup: \`py312\`, \`latest\` tags" >> $GITHUB_STEP_SUMMARY
