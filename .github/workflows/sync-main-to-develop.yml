---
name: Sync Main to Develop

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if not on main'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Main to Develop
    runs-on: ubuntu-latest
    # Only run on main branch or manual workflow_dispatch with force=true
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main to develop
        run: |
          set -euo pipefail
          git fetch origin main develop

          BEHIND=$(git rev-list --count origin/develop..origin/main)
          printf "Develop is %s commits behind main\n" "$BEHIND"

          if [ "$BEHIND" -eq 0 ]; then
            printf "✅ Develop is already up to date with main\n"
            exit 0
          fi

          git checkout develop
          git merge origin/main --no-edit
          git push origin develop
          printf "✅ Synced main → develop\n"

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Main SHA**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: Check job logs for details" >> "$GITHUB_STEP_SUMMARY"
