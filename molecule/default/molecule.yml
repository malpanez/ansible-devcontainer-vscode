---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ${TEST_DISTRO:-debian12}
    image: ${TEST_IMAGE:-geerlingguy/docker-debian12-ansible:latest}
    privileged: true
    override_command: false
    environment:
      ANSIBLE_FORCE_COLOR: "true"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  inventory:
    host_vars:
      ${TEST_DISTRO:-debian12}:
        ansible_python_interpreter: /usr/bin/python3

verifier:
  name: testinfra
  options:
    sudo: true

scenario:
  test_sequence:
    - converge
    - verify
    - destroy
