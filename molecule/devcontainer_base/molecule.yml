---
dependency:
  name: galaxy
  options:
    requirements_file: ../../requirements.yml

driver:
  name: docker

platforms:
  - name: ${TEST_DISTRO:-debian12}
    image: ${TEST_IMAGE:-geerlingguy/docker-debian12-ansible:latest}
    privileged: true
    override_command: false
    environment:
      ANSIBLE_FORCE_COLOR: "true"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml

scenario:
  test_sequence:
    - converge
    - verify
    - destroy
